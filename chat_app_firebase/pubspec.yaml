name: chat_app_firebase
description: "Real-time chat application built with Flutter and Firebase featuring messaging, read receipts, and push notifications."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.6.1
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.5
  firebase_messaging: ^15.2.5

  # State Management
  provider: ^6.1.2

  # Image Handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
